name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint deps
        run: pip install ruff black isort mypy

      - name: Ruff
        run: ruff check src/ app/ scripts/

      - name: Black
        run: black --check src/ app/ scripts/

      - name: isort
        run: isort --check-only src/ app/ scripts/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing --ignore=tests/test_training.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Streamlit image
        run: docker build -f docker/Dockerfile.streamlit -t llm-fine-tune-lab:streamlit .

  streamlit-check:
    name: Streamlit Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install streamlit deps
        run: pip install -r streamlit_requirements.txt

      - name: Check app imports
        run: python -c "import ast, sys, pathlib; [ast.parse(p.read_text()) for p in pathlib.Path('app').rglob('*.py')]; print('All app files parse OK')"
