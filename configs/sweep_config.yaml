method: bayes
metric:
  name: eval/loss
  goal: minimize

name: llm-finetune-sweep-20runs

parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 1.0e-05
    max: 5.0e-04

  lora_r:
    values: [8, 16, 32, 64]

  lora_alpha:
    values: [16, 32, 64]

  lora_dropout:
    values: [0.0, 0.05, 0.1]

  per_device_train_batch_size:
    values: [2, 4, 8]

  gradient_accumulation_steps:
    values: [2, 4, 8]

  warmup_ratio:
    distribution: uniform
    min: 0.01
    max: 0.1

  weight_decay:
    values: [0.0, 0.01, 0.1]

  neftune_noise_alpha:
    values: [0.0, 5.0, 10.0]

  num_train_epochs:
    values: [1, 2, 3]

  lr_scheduler_type:
    values: [cosine, linear, constant_with_warmup]

  bnb_4bit_quant_type:
    values: [nf4, fp4]

  bnb_4bit_use_double_quant:
    values: [true, false]

early_terminate:
  type: hyperband
  min_iter: 3
  eta: 3
