version: "3.9"

services:
  # ── Inference API (vLLM + FastAPI) ─────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: llm-api
    ports:
      - "8000:8000"
    environment:
      MODEL_NAME: ${MODEL_NAME:-meta-llama/Meta-Llama-3-8B}
      ADAPTER_DIR: /workspace/outputs/adapters
      TENSOR_PARALLEL_SIZE: ${TENSOR_PARALLEL_SIZE:-1}
      GPU_MEMORY_UTIL: ${GPU_MEMORY_UTIL:-0.90}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-4096}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WANDB_API_KEY: ${WANDB_API_KEY}
      ALLOWED_ORIGINS: "*"
    volumes:
      - ../outputs:/workspace/outputs
      - huggingface_cache:/workspace/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ── Streamlit Dashboard ──────────────────────────────────────────────────────
  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    container_name: llm-dashboard
    ports:
      - "8501:8501"
    environment:
      VLLM_API_URL: http://api:8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: llm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: llm-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  huggingface_cache:
  prometheus_data:
  grafana_data:
